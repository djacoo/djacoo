<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" width="1600" height="820" role="img" aria-label="djacoo — an ongoing practice">
  <defs>
    <style>
      .serif { font-family: Didot, 'Bodoni 72', 'Playfair Display', 'Cormorant Garamond', Baskerville, 'Times New Roman', serif; }
      .mono  { font-family: 'JetBrains Mono', Menlo, Consolas, 'Liberation Mono', monospace; }
      .ink   { fill: #1A140E; }
      .gold  { fill: #8A6F4A; }
    </style>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3E9D6"/>
      <stop offset="1" stop-color="#E7DBBE"/>
    </linearGradient>
  </defs>

  <!-- warm paper -->
  <rect width="1600" height="820" fill="url(#paper)"/>

  <!-- primary flowing curve (animated draw) -->
  <path d="M -80 160 C 300 340, 600 80, 820 420 S 1320 720, 1680 470" fill="none" stroke="#8A6F4A" stroke-width="1.25" opacity="0.85" stroke-dasharray="3400" stroke-dashoffset="3400">
    <animate attributeName="stroke-dashoffset" values="3400;0;0;-3400" dur="16s" repeatCount="indefinite"/>
  </path>

  <!-- secondary flowing curve (counter-weave) -->
  <path d="M -80 720 C 360 540, 700 820, 1100 560 S 1520 300, 1680 650" fill="none" stroke="#8A6F4A" stroke-width="1" opacity="0.5" stroke-dasharray="3400" stroke-dashoffset="-3400">
    <animate attributeName="stroke-dashoffset" values="-3400;0;0;3400" dur="22s" repeatCount="indefinite"/>
  </path>

  <!-- tertiary whisper curve -->
  <path d="M 120 80 C 500 260, 900 540, 1500 220" fill="none" stroke="#1A140E" stroke-width="0.5" opacity="0.22" stroke-dasharray="2600" stroke-dashoffset="2600">
    <animate attributeName="stroke-dashoffset" values="2600;0;0;0" dur="28s" repeatCount="indefinite"/>
  </path>

  <!-- arched portal -->
  <path d="M 540 700 V 340 A 260 200 0 0 1 1060 340 V 700" fill="none" stroke="#1A140E" stroke-width="0.75" opacity="0.3"/>

  <!-- + cross markers -->
  <g class="ink" font-family="serif" font-size="20" opacity="0.55">
    <text x="200"  y="220">+</text>
    <text x="1380" y="300">+</text>
    <text x="240"  y="600">+</text>
    <text x="1360" y="660">+</text>
  </g>

  <!-- top hairline -->
  <line x1="80" y1="70" x2="1520" y2="70" stroke="#1A140E" stroke-width="0.75" opacity="0.4"/>

  <!-- top rail mono -->
  <text x="80"   y="54" class="mono ink" font-size="11" letter-spacing="2.5">N° 001 &#x2002;&#x00B7;&#x2002; DJACOO</text>
  <text x="800"  y="54" class="mono ink" font-size="11" letter-spacing="2.5" text-anchor="middle" opacity="0.7">A PRIVATE PRACTICE &#x2002;&#x00B7;&#x2002; IMAGINE POSSIBLE</text>
  <text x="1520" y="54" class="mono ink" font-size="11" letter-spacing="2.5" text-anchor="end">MMXXVI</text>

  <!-- ornament above wordmark -->
  <text x="800" y="215" class="gold serif" font-size="28" text-anchor="middle">&#x2726;</text>

  <!-- wordmark: big serif display -->
  <text x="800" y="480" class="serif ink" font-size="260" font-weight="400" text-anchor="middle" letter-spacing="-2">djacoo</text>

  <!-- italic serif subtitle -->
  <text x="800" y="555" class="serif ink" font-size="38" font-style="italic" text-anchor="middle" opacity="0.85">an ongoing practice</text>

  <!-- mono sub-subtitle -->
  <text x="800" y="605" class="mono ink" font-size="13" letter-spacing="6" text-anchor="middle" opacity="0.65">ARTIFICIAL INTELLIGENCE &#x2002;&#x00B7;&#x2002; MACHINE LEARNING &#x2002;&#x00B7;&#x2002; BIOINFORMATICS</text>

  <!-- side annotations (left) -->
  <text x="170" y="435" class="mono ink" font-size="11" letter-spacing="2.5" opacity="0.7">A PRIVATE</text>
  <text x="170" y="455" class="mono ink" font-size="11" letter-spacing="2.5" opacity="0.7">INVESTIGATION</text>
  <text x="170" y="475" class="mono ink" font-size="11" letter-spacing="2.5" opacity="0.45">FOR MAKERS</text>

  <!-- side annotations (right) -->
  <text x="1430" y="435" class="mono ink" font-size="11" letter-spacing="2.5" text-anchor="end" opacity="0.7">UNIVERSIT&#xC0;</text>
  <text x="1430" y="455" class="mono ink" font-size="11" letter-spacing="2.5" text-anchor="end" opacity="0.7">DEGLI STUDI</text>
  <text x="1430" y="475" class="mono ink" font-size="11" letter-spacing="2.5" text-anchor="end" opacity="0.7">DI VERONA</text>

  <!-- pulsing asterism (signature mark) -->
  <text x="800" y="685" class="gold serif" font-size="32" text-anchor="middle">&#x2726;<animate attributeName="opacity" values="0.45;1;0.45" dur="5s" repeatCount="indefinite"/></text>

  <!-- bottom hairline -->
  <line x1="80" y1="752" x2="1520" y2="752" stroke="#1A140E" stroke-width="0.75" opacity="0.4"/>

  <!-- bottom rail mono -->
  <text x="80"   y="774" class="mono ink" font-size="11" letter-spacing="2.5">LAT 45.44&#xB0;N &#x2002;&#x00B7;&#x2002; LON 10.99&#xB0;E</text>
  <text x="800"  y="774" class="mono ink" font-size="11" letter-spacing="2.5" text-anchor="middle">VERONA &#x2002;&#x00B7;&#x2002; ITALIA</text>
  <text x="1520" y="774" class="mono ink" font-size="11" letter-spacing="2.5" text-anchor="end">I &#x2002;&#x2014;&#x2002; I</text>

  <!-- colophon rail -->
  <text x="80"   y="794" class="mono ink" font-size="10" letter-spacing="2" opacity="0.55">SET IN DIDOT &amp; JETBRAINS MONO</text>
  <text x="800"  y="794" class="mono ink" font-size="10" letter-spacing="2" opacity="0.55" text-anchor="middle">NOTHING SHOWN FIRST</text>
  <text x="1520" y="794" class="mono ink" font-size="10" letter-spacing="2" opacity="0.55" text-anchor="end">EDITION 01 &#x2044; &#x221E;</text>
</svg>
